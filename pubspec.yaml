name: photoshield_app
description: PhotoShield Korea - AI 기반 이미지 도용 탐지 앱
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 라우팅
  go_router: ^13.0.0

  # 상태 관리
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # 네트워크
  dio: ^5.4.0

  # 로컬 저장소
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # 이미지 처리
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Firebase
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # 로컬 알림
  flutter_local_notifications: ^17.0.0

  # PDF 뷰어
  flutter_pdfview: ^1.3.2

  # 유틸
  url_launcher: ^6.2.5
  intl: ^0.20.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
